name: Nikhil's Daily Commit

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          ref: main

      - name: Create or update commit file
        run: |
          FILE="commit_number.md"
          if [ ! -f "$FILE" ]; then
            echo "Hello, my name is Nikhil" > "$FILE"
            echo "commit number: 1" >> "$FILE"
          else
            CURRENT_COUNT=$(grep -oP 'commit number: \K\d+' "$FILE")
            if [ -z "$CURRENT_COUNT" ]; then
              CURRENT_COUNT=0
            fi
            NEXT_COUNT=$((CURRENT_COUNT + 1))
            sed -i "/commit number: /c\commit number: $NEXT_COUNT" "$FILE"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "nikhil94058"
          git config --global user.email "nikhild.ug22@gmail.com"

      - name: Commit and push changes
        run: |
          git add commit_number.md
          git commit -m "Daily commit: updated commit count"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nikhil94058/<YOUR_REPOSITORY>.git
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
